services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-uasd_despacho}
      POSTGRES_USER:     ${POSTGRES_USER:-uasd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uasd} -d ${POSTGRES_DB:-uasd_despacho}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-uasd}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-uasd_despacho}
      JWT_SECRET:   ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node src/migrate.js && node src/app.js"

  frontend:
    build: .
    restart: unless-stopped
    depends_on:
      - api

volumes:
  pgdata:
