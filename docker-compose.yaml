services:
  db:
    image: postgres:16-alpine
    hostname: db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-uasd_despacho}
      POSTGRES_USER:     ${POSTGRES_USER:-uasd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uasd} -d ${POSTGRES_DB:-uasd_despacho}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/icleyvin/uasd-despacho-api:latest
    hostname: api
    restart: unless-stopped
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER:-uasd}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-uasd_despacho}
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CORS_ORIGIN:   ${CORS_ORIGIN}
      NODE_ENV:      ${NODE_ENV:-production}
      PORT:          3000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node src/migrate.js && node src/app.js"

  frontend:
    image: ghcr.io/icleyvin/uasd-despacho-frontend:latest
    hostname: frontend
    restart: unless-stopped
    depends_on:
      - api

volumes:
  pgdata:
