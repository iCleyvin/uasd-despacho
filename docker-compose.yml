services:
  db:
    image: postgres:16-alpine
    hostname: db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-uasd_despacho}
      POSTGRES_USER:     ${POSTGRES_USER:-uasd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uasd} -d ${POSTGRES_DB:-uasd_despacho}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    hostname: api
    restart: unless-stopped
    environment:
      DATABASE_URL:  postgresql://${POSTGRES_USER:-uasd}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-uasd_despacho}
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      PORT:          3000
      NODE_ENV:      production
      # COOKIE_SECURE=true solo si hay HTTPS. Dejar en false para HTTP en LAN.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node --max-http-header-size=32768 src/migrate.js && node --max-http-header-size=32768 src/app.js"

  frontend:
    build: .
    hostname: frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - api

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGUSER:     ${POSTGRES_USER:-uasd}
      PGDATABASE: ${POSTGRES_DB:-uasd_despacho}
    volumes:
      - ./backups:/backups
      - ./backup/backup.sh:/backup.sh:ro
      - ./backup/cleanup.sh:/cleanup.sh:ro
    depends_on:
      db:
        condition: service_healthy
    # Ejecuta backup diario a las 02:00
    entrypoint: >
      sh -c "
        cp /backup.sh /tmp/backup.sh && sed -i 's/\r//' /tmp/backup.sh && chmod +x /tmp/backup.sh &&
        cp /cleanup.sh /tmp/cleanup.sh && sed -i 's/\r//' /tmp/cleanup.sh && chmod +x /tmp/cleanup.sh &&
        printf '0 2 * * * /tmp/backup.sh >> /proc/1/fd/1 2>&1\n0 3 1 * * /tmp/cleanup.sh >> /proc/1/fd/1 2>&1\n' > /etc/crontabs/root &&
        echo '[backup] Servicio iniciado. Proximo backup: 02:00 diario.' &&
        crond -f -d 6
      "

volumes:
  pgdata:
