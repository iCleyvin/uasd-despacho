# ─── HTTP → redirigir a HTTPS (excepto health check interno) ─────────────────
server {
    listen 80;
    server_name _;
    server_tokens off;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Health check accesible por HTTP para Docker y monitoreo interno
    location = /api/health {
        set $backend http://api:3000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # Todo lo demás redirige a HTTPS con el puerto correcto (3443)
    location / {
        return 301 https://$host:3443$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Certificados TLS (autofirmados o de CA)
    # Genera uno autofirmado con: ./ssl/generate-cert.sh
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Protocolos y cifrados seguros
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    large_client_header_buffers 4 32k;
    client_header_buffer_size 8k;
    client_max_body_size 2m;

    # Use Docker's embedded DNS for upstream resolution
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy API requests to the backend service
    location /api/ {
        set $backend http://api:3000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy
      "default-src 'self';
       script-src  'self';
       style-src   'self' 'unsafe-inline';
       font-src    'self' data:;
       img-src     'self' data:;
       connect-src 'self';
       object-src  'none';
       frame-ancestors 'none';"
      always;

    # Bloquear source maps en producción (exponen código fuente)
    location ~* \.(js|css)\.map$ {
        return 404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/xml;
}
